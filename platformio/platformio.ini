; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html



[platformio]
default_envs = nodemcu-32s-gavirate4

[common]
build_flags = '-Wall' 
	'-std=gnu++17'
	-D CORE_DEBUG_LEVEL=3 
	-D LOCATION_BESOZZO=1
	-D LOCATION_GAVIRATE4=2
	-D LOCATION_GAVIRATE6=3
	-D LOCATION_ZURIGO=4

build_unflags = '-Werror' '-std=gnu++11'

[env]
monitor_speed = 115200
upload_speed = 921600
board_build.f_cpu = 80000000L
platform = espressif32@6.11.0
framework = arduino
build_unflags = ${common.build_unflags}
build_flags = ${common.build_flags}
board_build.partitions = huge_app.csv
lib_deps = 
	adafruit/Adafruit BME280 Library @ 2.3.0
	adafruit/Adafruit BME680 Library @ 2.0.5
	adafruit/Adafruit BusIO @ 1.17.1
	adafruit/Adafruit Unified Sensor @ 1.1.15
	bblanchon/ArduinoJson @ 7.4.1
	zinggjm/GxEPD2 @ 1.6.4

[env:arduino_nano_esp32]
board = arduino_nano_esp32
build_flags = ${common.build_flags} 
	-D ARDUINO_NANO_ESP32
	-D HAS_BUILTIN_LED


[env:dfrobot_firebeetle2_esp32e]
board = dfrobot_firebeetle2_esp32e
build_flags = ${common.build_flags} 
	-D DFROBOT_FIREBEETLE2_ESP32E
	-D HAS_BUILTIN_LED

[env:firebeetle32]
board = firebeetle32
build_flags = ${common.build_flags} 
	-D FIREBEETLE32
	-D HAS_BUILTIN_LED

[env:waveshare_esp32]
board = esp32dev
build_flags = ${common.build_flags} 
	-D WAVESHARE_ESP32
	-D HAS_BUILTIN_LED

[env:waveshare_esp32s3zero]
board = esp32-s3-devkitc-1
board_build.flash_mode = qio
board_build.psram_type = qio
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
build_flags = ${common.build_flags} 
	-D WAVESHARE_ESP32S3_ZERO
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1  

build_unflags = ${common.build_unflags}

; https://www.amazon.it/dp/B071P98VTG?ref_=ppx_hzsearch_conn_dt_b_fed_asin_title_8&th=1
[env:nodemcu-32s-gavirate4]
board = nodemcu-32s
build_flags = ${common.build_flags} 
	-D NODEMCU_32S
	-D HAS_BUILTIN_LED
	-D DISP_BW_V2	; Black and White display v1
	-D DRIVER_WAVESHARE	; Waveshare display driver
	-D BATTERY_MONITORING=0
	-D BATTERY_POWER_SAVING=0
	-D DEBUG_LEVEL=1
	-D DELAY_BEFORE_SLEEP=20000
	-D CONFIG_SLEEP_DURATION=120
	-D CONFIG_BED_TIME=22
	-D CONFIG_WAKE_TIME=05
	-D CONFIG_HOURLY_GRAPH_MAX=24
	-D LOCATION=LOCATION_GAVIRATE4
