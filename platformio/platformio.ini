; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html



[platformio]
default_envs = waveshare_esp32_c6zero

[common]
build_flags = '-Wall' 
	'-std=gnu++17'
	-D CORE_DEBUG_LEVEL=4
	-D LOG_TAG=\"epd-weather\"
	-D LOG_LOCAL_LEVEL=ESP_LOG_DEBUG
	-D CONFIG_LOG_VERSION=2
	-D CONFIG_LOG_COLORS_SUPPORT
	-D CONFIG_LOG_COLORS
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1  	

build_unflags = '-Werror' '-std=gnu++11' -D CONFIG_LOG_VERSION

[env]
monitor_speed = 115200
upload_speed = 921600
board_build.f_cpu = 80000000L
platform = espressif32 @ 6.13.0
framework = arduino
build_unflags = ${common.build_unflags}
build_flags = ${common.build_flags}
board_build.partitions = huge_app.csv
lib_deps =
  adafruit/Adafruit BME280 Library @ 2.3.0
  adafruit/Adafruit BME680 Library @ 2.0.6
  adafruit/Adafruit BusIO @ 1.17.4
  adafruit/Adafruit Unified Sensor @ 1.1.15
  bblanchon/ArduinoJson @ 7.4.3
  zinggjm/GxEPD2 @ 1.6.8

