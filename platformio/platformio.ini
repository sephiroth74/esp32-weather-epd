; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html



[platformio]
default_envs = seeed_xiao_esp32_c6

[common]
build_flags = '-Wall' 
	'-std=gnu++17'
	-D CORE_DEBUG_LEVEL=3 
	-D LOCATION_BESOZZO=1
	-D LOCATION_GAVIRATE4=2
	-D LOCATION_GAVIRATE6=3
	-D LOCATION_ZURIGO=4

build_unflags = '-Werror' '-std=gnu++11'

[env]
monitor_speed = 115200
upload_speed = 921600
board_build.f_cpu = 80000000L
platform = espressif32@6.11.0
framework = arduino
build_unflags = ${common.build_unflags}
build_flags = ${common.build_flags}
board_build.partitions = huge_app.csv
lib_deps = 
	adafruit/Adafruit BME280 Library @ 2.3.0
	adafruit/Adafruit BME680 Library @ 2.0.5
	adafruit/Adafruit BusIO @ 1.17.1
	adafruit/Adafruit Unified Sensor @ 1.1.15
	bblanchon/ArduinoJson @ 7.4.1
	zinggjm/GxEPD2 @ 1.6.4


[env:dfrobot_firebeetle2_esp32e]
board = dfrobot_firebeetle2_esp32e
build_flags = ${common.build_flags} 
	-D DFROBOT_FIREBEETLE2_ESP32E
	-D HAS_BUILTIN_LED

[env:firebeetle32]
board = firebeetle32
build_flags = ${common.build_flags} 
	-D FIREBEETLE32
	-D HAS_BUILTIN_LED

; https://www.waveshare.com/wiki/ESP32-S3-Zero
[env:waveshare_esp32s3zero]
board = esp32-s3-devkitc-1
board_build.flash_mode = qio
board_build.psram_type = qio
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
build_flags = ${common.build_flags} 
	-D LOCAL_CONFIG_FILE=config/waveshare-esp32s3-zero.h
	-D LOCATION_CONFIG_FILE=config/locations/gavirate_4.cpp
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1  
build_unflags = ${common.build_unflags} 
	-D HAS_BUILTIN_LED

; https://wiki.seeedstudio.com/xiao_esp32c6_with_platform_io/
[env:seeed_xiao_esp32_c6]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-esp32-c6
build_flags = 
	${common.build_flags} 
	-D LOCAL_CONFIG_FILE=config/seedstudio-esp32-c6.h
	-D LOCATION_CONFIG_FILE=config/locations/zurigo.cpp
build_unflags = ${common.build_unflags}