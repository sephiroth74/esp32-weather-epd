[env:waveshare_esp32_c6zero]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-c6-devkitm-1
build_flags =
	${common.build_flags}
	-D HAS_BUILTIN_LED
	-D LOCAL_CONFIG_FILE=config/waveshare-esp32-c6.h
	-D LOCATION_CONFIG_FILE=config/locations/zurigo.cpp	
build_unflags = ${common.build_unflags}


; ==============================================================================

; https://wiki.seeedstudio.com/xiao_esp32c6_with_platform_io/
; Using pioarduino/espressif32 which has proper ESP32-C6 support
[env:seeed_xiao_esp32_c6]
platform = https://github.com/pioarduino/platform-espressif32.git
board = seeed_xiao_esp32c6
build_flags =
	${common.build_flags}
	-D HAS_BUILTIN_LED
	-D LOCAL_CONFIG_FILE=config/seedstudio-esp32-c6.h
	-D LOCATION_CONFIG_FILE=config/locations/zurigo.cpp	
build_unflags = ${common.build_unflags}

; ==============================================================================

[env:dfrobot_firebeetle2_esp32e]
board = dfrobot_firebeetle2_esp32e
build_flags =
	${common.build_flags}
	-D HAS_BUILTIN_LED
build_unflags = ${common.build_unflags}

; ==============================================================================

[env:firebeetle32]
board = firebeetle32
build_flags =
	${common.build_flags}
	-D HAS_BUILTIN_LED
build_unflags = ${common.build_unflags}